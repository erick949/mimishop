services:

  # ─────────────────────────────────────────────────────────
  #  Base de datos PostgreSQL
  # ─────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: mimishop_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-mimishop}
      POSTGRES_USER:     ${POSTGRES_USER:-mimishop_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mimishop_user} -d ${POSTGRES_DB:-mimishop}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mimishop_net

  # ─────────────────────────────────────────────────────────
  #  Cache / broker Redis
  # ─────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: mimishop_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mimishop_net

  # ─────────────────────────────────────────────────────────
  #  Backend Django + Gunicorn
  # ─────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: mimishop_backend
    restart: unless-stopped
    ports:
      - "8001:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-mimishop_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-mimishop}
      REDIS_URL:    redis://:${REDIS_PASSWORD:-redispass}@redis:6379/0
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mimishop_net

  # ─────────────────────────────────────────────────────────
  #  Frontend React → Nginx (SPA + proxy)
  # ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: mimishop_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    volumes:
      - static_files:/usr/share/nginx/static:ro
      - media_files:/usr/share/nginx/media:ro
    depends_on:
      - backend
    networks:
      - mimishop_net

# ─────────────────────────────────────────────────────────
#  Volumes y redes
# ─────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  static_files:
  media_files:

networks:
  mimishop_net:
    driver: bridge