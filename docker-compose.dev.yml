# Sobreescribe docker-compose.yml para desarrollo local
# Uso: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:

  backend:
    build:
      target: builder          # Detener en stage builder (tiene todas las devtools)
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./servidor_mimishop:/app   # hot-reload: código montado desde el host
    environment:
      DEBUG: "True"
    ports:
      - "8000:8000"            # acceso directo al API en dev

  frontend:
    build: !reset null          # No usamos la imagen de Nginx en dev
    image: node:20-alpine
    container_name: mimishop_frontend_dev
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./mimishop-frontend:/app
      - node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: https://mimishop-backend.onrender.com

volumes:
  node_modules:
